# LLM Provider Configuration
# This file defines providers, available model options, and active role assignments.
#
# Two modes: "testing" (free models) and "experiment" (full paid run).
# Switch by changing the `use:` keys under roles and swapping evaluation_targets.

# =============================================================================
# PROVIDERS - API endpoints and authentication
# =============================================================================
# Policy: OpenRouter for everything, except Gemini via Google AI Studio (free credits).
# Groq no longer receives model updates since NVIDIA deal.
providers:
  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  gemini:
    type: openai_compatible
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GOOGLE_AI_STUDIO_API_KEY

  # Legacy providers (kept for reference, not actively used)
  scaleway:
    type: openai_compatible
    base_url: https://api.scaleway.ai/v1
    api_key_env: SCALEWAY_API_KEY

  groq:
    type: openai_compatible
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  openai:
    type: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  mistral:
    type: openai_compatible
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY

# =============================================================================
# MODEL OPTIONS - Full menu of available models per role
# =============================================================================
model_options:
  therapist:
    openrouter_llama70b:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct
      notes: "Same as router for consistency"
    openrouter_llama70b_free:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
      notes: "Free tier for testing"

  patient:
    openrouter_venice:
      provider: openrouter
      model: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
      notes: "Uncensored Mistral fine-tune, good for nightmare/trauma roleplay. Always free"

  router:
    openrouter_llama70b:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct
      notes: "Capable, reliable stage classifier"
    openrouter_llama70b_free:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
      notes: "Free tier for testing"

  judge:
    gemini31_pro:
      provider: gemini
      model: gemini-3.1-pro-preview
      standard_temp: 1.0  # Gemini 3 requires T=1.0 for reasoning. See docs/grounded/temperature_sources.md
      notes: "Best judge. 250 RPD Tier 1 limit. Switch back when Tier 2"
    gemini3_flash:
      provider: gemini
      model: gemini-3-flash-preview
      standard_temp: 1.0  # Gemini 3 requires T=1.0 for reasoning
      notes: "Near-Pro reasoning, high rate limits. $0.50/$3.00. Recommended for experiment"
    gemini31_flash_lite:
      provider: gemini
      model: gemini-3.1-flash-lite-preview
      standard_temp: 1.0  # Gemini 3 requires T=1.0 for reasoning. See docs/grounded/temperature_sources.md
      notes: "Testing judge. Cheapest Gemini. $0.25/$1.50"

# =============================================================================
# ACTIVE ROLES - Current selection (change these to swap models)
# =============================================================================
# --- TESTING MODE (free tier) ---
# To switch to experiment mode, change use: keys to paid variants
roles:
  therapist:
    use: openrouter_llama70b_free
    temperature: 0.0
    max_tokens: 1024

  patient:
    use: openrouter_venice
    temperature: 0.7
    max_tokens: 512

  router:
    use: openrouter_llama70b_free
    temperature: 0.0
    max_tokens: 32

  judge:
    use: gemini31_flash_lite  # default (testing)
    use_experiment: gemini3_flash  # near-Pro reasoning, high rate limits
    # use_experiment: gemini31_pro  # Tier 2 needed (1,000 RPM, no daily cap)
    temperature: 1.0  # Gemini 3 requires T=1.0. Lower causes looping/degraded reasoning (Google docs)
    max_tokens: 4096  # Extra budget for Gemini thinking tokens

# =============================================================================
# EVALUATION TARGETS - All available models (select via --model on CLI)
# =============================================================================
evaluation_targets:
  # --- Testing ---
  - name: llama70b_test
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct
    therapy_temp: 0.6  # see docs/grounded/temperature_sources.md
    notes: "Llama 3.3 70B. Smoke testing and taxonomy validation"

  - name: gpt_oss_test
    provider: openrouter
    model: openai/gpt-oss-120b
    therapy_temp: 1.0  # see docs/grounded/temperature_sources.md
    notes: "GPT-oss 120B. Smoke testing and taxonomy validation"

  # --- Experiment ---
  # therapy_temp: vendor-recommended temperature for clinical/therapeutic use.
  #   Derived from official defaults and the "lower bound" rule: when a vendor
  #   recommends a range, choose the lower end for clinical stability.
  #   Sources and verification status: docs/grounded/temperature_sources.md

  # --- Main targets (Mistral EU-sovereign) ---
  - name: mistral_small4
    provider: openrouter
    model: mistralai/mistral-small-2603
    therapy_temp: 0.15  # same Mistral default as Large [NEEDS VERIFICATION]
    extra_params:
      reasoning:
        effort: "none"
    notes: "Primary subject. EU-sovereign, Apache 2.0. 119B MoE (6.5B active, 128 experts). Non-thinking mode. $0.15/$0.60"

  - name: mistral_large
    provider: openrouter
    model: mistralai/mistral-large-2512
