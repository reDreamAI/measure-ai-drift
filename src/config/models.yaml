# LLM Provider Configuration
# This file defines providers, available model options, and active role assignments.

# =============================================================================
# PROVIDERS - API endpoints and authentication
# =============================================================================
providers:
  scaleway:
    type: openai_compatible
    base_url: https://api.scaleway.ai/v1
    api_key_env: SCALEWAY_API_KEY

  groq:
    type: openai_compatible
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  openai:
    type: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  vertex:
    type: openai_compatible  # Vertex has OpenAI-compatible endpoint
    base_url: https://${GCP_REGION}-aiplatform.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/endpoints/openapi
    api_key_env: GOOGLE_APPLICATION_CREDENTIALS  # Uses ADC

  gemini:
    type: openai_compatible
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GOOGLE_AI_STUDIO_API_KEY

  mistral:
    type: openai_compatible
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY

  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

# =============================================================================
# MODEL OPTIONS - Full menu of available models per role
# =============================================================================
model_options:
  therapist:
    groq_llama70b:
      provider: groq
      model: llama-3.3-70b-versatile
      notes: "Same as router for consistency"
    mistral_sovereign:
      provider: scaleway
      model: mistral-small-3.2-24b-instruct-2506
      notes: "Sovereign EU option"
    groq_oss:
      provider: groq
      model: openai/gpt-oss-120
      notes: "Fast, free tier available"
    openai_gpt4o:
      provider: openai
      model: gpt-4o-2024-08-06
      notes: "Benchmark baseline"

  patient:
    groq_qwen:
      provider: groq
      model: qwen/qwen3-32b
      notes: "Strong reasoning, good roleplay"
    groq_kimi:
      provider: groq
      model: moonshotai/kimi-k2-instruct-0905
      notes: "Good roleplay, fast"
    vertex_claude:
      provider: vertex
      model: claude-sonnet-4-20250514
      notes: "Strong reasoning, higher cost"
    openrouter_mimo:
      provider: openrouter
      model: xiaomi/mimo-v2-flash:free
      notes: "Free tier (DEPRECATED - free period ended)"
    openrouter_trinity:
      provider: openrouter
      model: arcee-ai/trinity-large-preview:free
      notes: "Free tier, good roleplay, fast"
    openrouter_venice:
      provider: openrouter
      model: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
      notes: "Uncensored Mistral fine-tune, good for nightmare/trauma roleplay"

  router:
    mistral_nemo:
      provider: scaleway
      model: mistral-nemo-instruct-2407
      notes: "Lightweight, fast"
    llama70b:
      provider: groq
      model: llama-3.3-70b-versatile
      notes: "More capable, slower"

  judge:
    gemini3_pro:
      provider: gemini
      model: gemini-3-pro-preview
      notes: "Primary evaluation model (future)"
    gemini_flash:
      provider: gemini
      model: gemini-2.5-flash
      notes: "Fast, cheap testing"

# =============================================================================
# ACTIVE ROLES - Current selection (change these to swap models)
# =============================================================================
roles:
  therapist:
    use: groq_llama70b  # References model_options.therapist.groq_llama70b
    temperature: 0.0
    max_tokens: 1024

  patient:
    use: openrouter_venice
    temperature: 0.7
    max_tokens: 512

  router:
    use: llama70b
    temperature: 0.0
    max_tokens: 32

  judge:
    use: gemini_flash
    temperature: 0.0
    max_tokens: 2048

# =============================================================================
# EVALUATION TARGETS - Models to compare in experiments
# =============================================================================
evaluation_targets:
  # --- Primary subject (EU flagship) ---
  - name: mistral_large
    provider: openrouter  # Direct: mistral / mistral-large-2512
    model: mistralai/mistral-large-2512
    notes: "Primary subject. EU-sovereign, Apache 2.0. 675B MoE (41B active). 256K context"

  # --- Small class (24-32B comparators) ---
  - name: mistral_small
    provider: scaleway
    model: mistral-small-3.2-24b-instruct-2506
    notes: "EU-origin, Apache 2.0. Small-class comparator"

  - name: qwen3_32b
    provider: groq
    model: qwen/qwen3-32b
    notes: "Benchmark leader at 32B. Apache 2.0. ~535 tok/s on Groq"

  - name: olmo3_32b
    provider: openrouter
    model: allenai/olmo-3.1-32b-instruct
    notes: "Fully open (weights + training data + code). Best provenance for thesis"

  # --- Mid class (70B + Mistral scaling) ---
  - name: llama70b
    provider: groq
    model: llama-3.3-70b-versatile
    notes: "Original efficacy study model. Continuity with prior work"

  - name: mistral_medium
    provider: openrouter  # Direct: mistral / mistral-medium-3-1-25-08
    model: mistralai/mistral-medium-3.1
    notes: "EU-origin, Mistral vertical scaling. Closed weights, API-only"

  # --- Proprietary ceiling ---
  - name: gemini3_pro
    provider: gemini
    model: gemini-3-pro-preview
    notes: "Proprietary ceiling. Free credits. Upgrade to gemini-3.1-pro-preview when available"

  # --- Pipeline testing ---
  - name: gemini_flash
    provider: gemini
    model: gemini-2.5-flash
    max_tokens: 8192  # Gemini 2.5 thinking tokens count against max_tokens
    notes: "Lightweight proprietary reference. Pipeline testing"
