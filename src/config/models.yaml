# LLM Provider Configuration
# This file defines providers, available model options, and active role assignments.
#
# Two modes: "testing" (free OpenRouter models) and "full" (paid experiment).
# Switch by changing the `use:` keys under roles and swapping evaluation_targets.

# =============================================================================
# PROVIDERS - API endpoints and authentication
# =============================================================================
# Policy: OpenRouter for everything, except Gemini via Google AI Studio (free credits).
# Groq no longer receives model updates since NVIDIA deal.
providers:
  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  gemini:
    type: openai_compatible
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GOOGLE_AI_STUDIO_API_KEY

  # Legacy providers (kept for reference, not actively used)
  scaleway:
    type: openai_compatible
    base_url: https://api.scaleway.ai/v1
    api_key_env: SCALEWAY_API_KEY

  openai:
    type: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  mistral:
    type: openai_compatible
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY

# =============================================================================
# MODEL OPTIONS - Full menu of available models per role
# =============================================================================
model_options:
  therapist:
    openrouter_llama70b:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct
      notes: "Same as router for consistency"
    openrouter_llama70b_free:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
      notes: "Free tier for testing"

  patient:
    openrouter_venice:
      provider: openrouter
      model: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
      notes: "Uncensored Mistral fine-tune, good for nightmare/trauma roleplay. Always free"

  router:
    openrouter_llama70b:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct
      notes: "Capable, reliable stage classifier"
    openrouter_llama70b_free:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
      notes: "Free tier for testing"

  judge:
    openrouter_gpt54:
      provider: openrouter
      model: openai/gpt-5.4
      notes: "Full experiment judge. Native json_schema enforcement. $2.50/$15.00 per M tokens"
    openrouter_gpt_oss:
      provider: openrouter
      model: openai/gpt-oss-120b:free
      notes: "Free testing judge. OpenAI open-weight 120B"

# =============================================================================
# ACTIVE ROLES - Current selection (change these to swap models)
# =============================================================================
# --- TESTING MODE (free tier) ---
# To switch to full mode, change use: keys to paid variants
roles:
  therapist:
    use: openrouter_llama70b_free
    temperature: 0.0
    max_tokens: 1024

  patient:
    use: openrouter_venice
    temperature: 0.7
    max_tokens: 512

  router:
    use: openrouter_llama70b_free
    temperature: 0.0
    max_tokens: 32

  judge:
    use: openrouter_gpt_oss  # Switch to openrouter_gpt54 for full experiment
    temperature: 0.0
    max_tokens: 2048

# =============================================================================
# EVALUATION TARGETS - Testing mode (free tier, pipeline development)
# =============================================================================
# Uncomment the full experiment section and comment this one to switch modes.
evaluation_targets:
  # --- Testing mode: 2 free models for pipeline dev ---
  - name: mistral_small_test
    provider: openrouter
    model: mistralai/mistral-small-3.1-24b-instruct:free
    notes: "Testing only. Free tier Mistral Small"

  - name: llama70b_test
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct:free
    notes: "Testing only. Free tier Llama 3.3"

