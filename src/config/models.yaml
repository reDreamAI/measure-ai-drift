# LLM Provider Configuration
# This file defines providers, available model options, and active role assignments.
#
# Two modes: "testing" (free models) and "experiment" (full paid run).
# Switch by changing the `use:` keys under roles and swapping evaluation_targets.

# =============================================================================
# PROVIDERS - API endpoints and authentication
# =============================================================================
# Policy: OpenRouter for everything, except Gemini via Google AI Studio (free credits).
# Groq no longer receives model updates since NVIDIA deal.
providers:
  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  gemini:
    type: openai_compatible
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GOOGLE_AI_STUDIO_API_KEY

  # Legacy providers (kept for reference, not actively used)
  scaleway:
    type: openai_compatible
    base_url: https://api.scaleway.ai/v1
    api_key_env: SCALEWAY_API_KEY

  groq:
    type: openai_compatible
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  openai:
    type: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY

  mistral:
    type: openai_compatible
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY

# =============================================================================
# MODEL OPTIONS - Full menu of available models per role
# =============================================================================
model_options:
  therapist:
    openrouter_llama70b:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct
      notes: "Same as router for consistency"
    openrouter_llama70b_free:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
      notes: "Free tier for testing"

  patient:
    openrouter_venice:
      provider: openrouter
      model: cognitivecomputations/dolphin-mistral-24b-venice-edition:free
      notes: "Uncensored Mistral fine-tune, good for nightmare/trauma roleplay. Always free"

  router:
    openrouter_llama70b:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct
      notes: "Capable, reliable stage classifier"
    openrouter_llama70b_free:
      provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
      notes: "Free tier for testing"

  judge:
    gemini31_pro:
      provider: gemini
      model: gemini-3.1-pro-preview
      notes: "Experiment judge. Thinking aids judgment accuracy. Free Google AI Studio credits"
    gemini31_flash_lite:
      provider: gemini
      model: gemini-3.1-flash-lite-preview
      notes: "Testing judge. Cheapest Gemini. Free Google AI Studio credits"

# =============================================================================
# ACTIVE ROLES - Current selection (change these to swap models)
# =============================================================================
# --- TESTING MODE (free tier) ---
# To switch to experiment mode, change use: keys to paid variants
roles:
  therapist:
    use: openrouter_llama70b_free
    temperature: 0.0
    max_tokens: 1024

  patient:
    use: openrouter_venice
    temperature: 0.7
    max_tokens: 512

  router:
    use: openrouter_llama70b_free
    temperature: 0.0
    max_tokens: 32

  judge:
    use: gemini31_flash_lite  # default (testing). Overridden to gemini31_pro for experiment models
    use_experiment: gemini31_pro
    temperature: 0.0
    max_tokens: 4096  # Extra budget for Gemini thinking tokens

# =============================================================================
# EVALUATION TARGETS - All available models (select via --model on CLI)
# =============================================================================
evaluation_targets:
  # --- Testing ---
  - name: llama70b_test
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct
    notes: "Llama 3.3 70B. Smoke testing and taxonomy validation"

  - name: gpt_oss_test
    provider: openrouter
    model: openai/gpt-oss-120b
    notes: "GPT-oss 120B. Smoke testing and taxonomy validation"

  # --- Experiment ---
  - name: mistral_large
    provider: openrouter
    model: mistralai/mistral-large-2512
    notes: "Primary subject. EU-sovereign, Apache 2.0. 675B MoE (41B active). 256K context"

  - name: qwen35_27b
    provider: openrouter
    model: qwen/qwen3.5-27b
    extra_params:
      reasoning:
        effort: "none"
    notes: "Qwen 3.5 27B dense. Apache 2.0. Non-thinking mode"

  - name: olmo3_32b
    provider: openrouter
    model: allenai/olmo-3.1-32b-instruct
    notes: "Fully open (weights + training data + code). Best provenance for thesis"

  - name: llama70b
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct
    notes: "Original efficacy study model. Continuity with prior work"

  - name: deepseek_v32
    provider: openrouter
    model: deepseek/deepseek-chat-v3-0324
    notes: "DeepSeek V3.2 671B MoE. MIT. Chinese origin. MoE comparator to Mistral Large"

  - name: gpt54
    provider: openrouter
    model: openai/gpt-5.4
    notes: "Proprietary ceiling. Non-thinking. $2.50/$15.00"

  # --- Dropped (available if needed) ---
