# IRT Strategy Taxonomy (6 categories)
# Source: Thesis methodology - standardized categories for plan classification
# Used for extracting and classifying therapeutic strategies in rescripting plans
#
# Revision notes:
#   - Split agency → confrontation + self_empowerment (agency was too broad,
#     dominated at 100% of trials; the two sub-mechanisms are clearly distinct:
#     external challenge vs internal strength)
#   - Dropped gradual_exposure (multi-session technique, not single-turn rescripting)
#   - Dropped 'name' field (was just a verbose alias for id; "/" in names
#     clashed with the plan output separator)
#   - v3: Sharpened descriptions to focus on mechanism (HOW the change works),
#     not outcome (what it achieves). Added NOT-examples to reduce overlap.
#   - v4: Merged emotional_regulation into sensory_modulation. In smoke testing
#     (120 trials, 2 models) emotional_regulation was picked once (0.4%).
#     Internal calming (breathing, self-talk) is a sensory/somatic mechanism,
#     not a distinct therapeutic move in single-turn rescripting.
#     Also sharpened cognitive_reframe vs self_empowerment boundary.

strategies:
  - id: confrontation
    description: "The dreamer directly faces, fights, or stands up to the threat itself (NOT avoiding, escaping, or gaining general confidence)"
    keywords:
      - confront
      - challenge
      - resist
      - face
      - stand up
      - fight
      - oppose

  - id: self_empowerment
    description: "The dreamer gains a new ability, skill, or inner strength they did not have before (e.g. discovers they can fly, becomes stronger, unlocks a hidden power). The DREAMER changes, not the threat. (NOT reinterpreting existing elements — that is cognitive_reframe)"
    keywords:
      - power
      - strength
      - ability
      - capable
      - skill
      - grow
      - transform
      - mastery
      - control

  - id: safety
    description: "A physical barrier, shelter, or protective figure is added to shield the dreamer (e.g. walls, locked doors, a guardian — NOT just feeling calm or changing the scene)"
    keywords:
      - barrier
      - shelter
      - shield
      - protection
      - guardian
      - wall
      - locked
      - secure

  - id: cognitive_reframe
    description: "The meaning or identity of existing dream elements changes (e.g. a monster becomes harmless, an enemy becomes a friend). The THREAT changes, not the dreamer. The element stays but is seen differently. (NOT the dreamer gaining new powers — that is self_empowerment)"
    keywords:
      - reframe
      - reinterpret
      - meaning
      - perspective
      - view differently
      - becomes

  - id: social_support
    description: "A new person, companion, or ally is introduced into the dream to help or accompany the dreamer"
    keywords:
      - ally
      - allies
      - support
      - helper
      - companion
      - friend
      - together

  - id: sensory_modulation
    description: "The dream's sensory qualities change — what is seen, heard, or felt shifts (e.g. darkness becomes light, harsh sounds become soft music, the dreamer feels calm through breathing or self-talk). Covers both external environment changes and internal somatic calming."
    keywords:
      - sensory
      - imagery
      - visual
      - sound
      - light
      - texture
      - brighter
      - quieter
      - softer
      - calm
      - soothing
      - breathing
      - peace

# Validation rules for generated plans
validation:
  min_strategies: 1
  max_strategies: 2
  allow_testing_more: true  # Can test plans with 3+ strategies, but they are flagged as invalid

# Clinical notes
notes: |
  The 1-2 strategy constraint ensures:
  - Focused therapeutic interventions
  - Clear attribution of effects
  - Reduced confounding in evaluation
  - Clinically realistic (therapists typically focus on 1-2 approaches per session)
